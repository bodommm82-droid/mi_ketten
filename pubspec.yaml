name: mi_ketten
description: Flutter 3.x Starter with Riverpod + GoRouter + Freezed
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  go_router: ^17.3.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dio: ^5.9.2
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^10.3.1
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  package_info_plus: ^10.1.0
  provider: ^6.1.5+1
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_core: ^3.0.0
  firebase_database: ^11.0.0
  flutter_dotenv: ^5.2.1
  google_generative_ai: ^0.4.5
  firebase_data_connect: ^0.1.5+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

  # Segédeszközök
  uuid: ^4.3.3

flutter:
  uses-material-design: true
  assets:
    - .env
